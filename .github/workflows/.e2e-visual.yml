name: .E2E Visual
env:
  deployment_name: pay-transparency
on:
  workflow_dispatch:
    inputs:
      frontend-url:
        description: "Frontend URL of the application"
        required: true
        type: string
      external-api-base-url :
        description: "Base URL to the external service API"
        required: true
        type: string
      environment:
        description: "Environment to read secrets from GitHub secrets"
        required: false
        default: dev
        type: string
      timeout-minutes:
        description: 'Timeout minutes'
        default: 12
        required: false
        type: number
  workflow_call:
    secrets:
      E2E_USERNAME:
        required: true
      E2E_PASSWORD:
        required: true
      EXTERNAL_CONSUMER_DELETE_REPORTS_API_KEY:
        required: true
    inputs:
      frontend-url:
        description: "Frontend URL of the application"
        required: true
        type: string
      environment:
        description: "Environment to read secrets from GitHub secrets"
        required: false
        default: dev
        type: string
      external-api-base-url :
        description: "Base URL to the external service API"
        required: true
        type: string
      timeout-minutes:
        description: 'Timeout minutes'
        default: 12
        required: false
        type: number

jobs:
  end-to-end-visual:
    name: Visual Regression Tests
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: frontend
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ fromJson(inputs.timeout-minutes) }}
    strategy:
      fail-fast: false  # Don't fail fast - we need all browsers to generate screenshots
      max-parallel: 4   # Run all browsers in parallel for faster screenshot generation
      matrix:
        project: [Google Chrome, firefox, safari, Microsoft Edge]
    steps:
      - uses: actions/checkout@v5
        name: Checkout
      - uses: actions/setup-node@v4
        name: Setup Node
        with:
          node-version: 22
      
      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Visual Regression Tests
        id: playwright-visual-tests
        env:
          E2E_BASE_URL: ${{ inputs.frontend-url }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          EXTERNAL_CONSUMER_DELETE_REPORTS_API_KEY: ${{ secrets.EXTERNAL_CONSUMER_DELETE_REPORTS_API_KEY }}
          EXTERNAL_API_BASE_URL: ${{ inputs.external-api-base-url }}
        run: |
          npx playwright test --project="${{ matrix.project }}" "**/visual-regression.spec.ts"
        continue-on-error: true  # Continue even if visual tests fail to generate all screenshots

      - name: Check for visual regression issues
        if: ${{ always() }}
        id: check-visual-regression
        run: |
          if [ -f "./test-results.json" ]; then
            if grep -q -e "Error: A snapshot doesn't exist at" -e "Screenshot comparison failed" "./test-results.json"; then
              echo "::notice::Visual regression issues detected in test results!"
              echo "::notice::Download the playwright artifact to see differences."
              echo "::notice::To approve new screenshots, add a comment '/approve-screenshots' to this PR"
              echo "::notice::Or manually run the 'Approve Screenshots' GitHub Action from the Actions tab"
              echo "::notice::This will update the visual baselines and re-run the tests"
              echo "has_visual_issues=true" >> $GITHUB_OUTPUT
              # Don't exit 1 here - we want to upload artifacts with new screenshots
            else
              echo "::notice::No visual regression issues detected."
              echo "has_visual_issues=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No test-results.json file found - tests may not have run or completed."
            echo "has_visual_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate updated screenshots
        if: ${{ always() && steps.check-visual-regression.outputs.has_visual_issues == 'true' }}
        id: generate-updated-screenshots
        env:
          E2E_BASE_URL: ${{ inputs.frontend-url }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          EXTERNAL_CONSUMER_DELETE_REPORTS_API_KEY: ${{ secrets.EXTERNAL_CONSUMER_DELETE_REPORTS_API_KEY }}
          EXTERNAL_API_BASE_URL: ${{ inputs.external-api-base-url }}
        run: |
          echo "::notice::Generating updated screenshots for comparison..."
          npx playwright test --update-snapshots --project="${{ matrix.project }}" "**/visual-regression.spec.ts"

      - uses: actions/upload-artifact@v4
        if: always()
        name: Upload Playwright visual test artifacts with screenshots
        with:
          name: playwright-visual-report-${{ matrix.project }}${{ steps.check-visual-regression.outputs.has_visual_issues == 'true' && '-with-updated-screenshots' || '' }}
          path: |
            ./frontend/playwright-report
            ./frontend/test-results
            ./frontend/test-results.json
            ./frontend/e2e/snapshots.ci
          retention-days: 7
